x-healthcheck-template: &healthcheck-template
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  # ============================================================================
  # Infrastructure Layer
  # ============================================================================

  redis-broker:
    build:
      context: ..
      dockerfile: srcs/redis/Dockerfile
    container_name: '${REDIS_SERVICE_NAME}'
    expose:
      - '${REDIS_SERVICE_PORT}'
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-template
      test: ['CMD', 'redis-cli', 'ping']

  # ============================================================================
  # Backend Services
  # ============================================================================

  user-service:
    build:
      context: ..
      dockerfile: srcs/users/Dockerfile
      target: builder
    container_name: '${UM_SERVICE_NAME}'
    expose:
      - '${UM_SERVICE_PORT}'
    env_file:
      - path: ./.env
      - path: ./.env.um
    environment:
      - NODE_ENV=development
    volumes:
      - ../srcs/users:/app/srcs/users
      - ../srcs/shared/core:/app/srcs/shared/core
      - /app/srcs/users/node_modules
      - /app/srcs/shared/core/node_modules
      - data:/app/data
      - uploads:/app/uploads
      - ../make/scripts/certs/certs/services/${UM_SERVICE_NAME}:/etc/certs:ro
      - ../make/scripts/certs/certs/ca:/etc/ca:ro
    ports:
      - '5555:5555'
    networks:
      - app-network
    working_dir: /app/srcs/users
    command: >
      sh -c "npx prisma generate &&
        npx prisma db push && 
        npx nodemon --watch src --watch ../shared/core/src -e ts --exec 'npx tsx' src/index.ts"
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          '--no-check-certificate',
          'https://127.0.0.1:${UM_SERVICE_PORT}/health',
        ]

  auth-service:
    build:
      context: ..
      dockerfile: srcs/auth/Dockerfile
      target: builder
    container_name: '${AUTH_SERVICE_NAME}'
    working_dir: /app/srcs/auth
    expose:
      - '${AUTH_SERVICE_PORT}'
    env_file:
      - path: ./.env
      - path: ./.env.auth
      - path: ./.env.oauth
    environment:
      - NODE_ENV=development
    volumes:
      - ../srcs/auth:/app/srcs/auth
      - ../srcs/shared/core:/app/srcs/shared/core
      - /app/node_modules
      - /app/srcs/auth/node_modules
      - /app/srcs/shared/core/node_modules
      - data:/data
      - ../make/scripts/certs/certs/services/${AUTH_SERVICE_NAME}:/etc/certs:ro
      - ../make/scripts/certs/certs/ca:/etc/ca:ro
    networks:
      - app-network
    command: >
      sh -c "npx nodemon --watch src --watch ../shared/core/src -e ts --exec 'npx tsx' src/index.ts"
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          '--no-check-certificate',
          'https://127.0.0.1:${AUTH_SERVICE_PORT}/health',
        ]

  blockchain-service:
    build:
      context: ..
      dockerfile: srcs/blockchain/Dockerfile
      target: builder
    container_name: '${BK_SERVICE_NAME}'
    working_dir: /app/srcs/blockchain
    ports:
      - '3005:3005'
    expose:
      - '${BK_SERVICE_PORT}'
    environment:
      - NODE_ENV=development
      - BLOCK_DB_PATH=/data/blockchain.db
      - REDIS_URL=redis://redis-broker:6379
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - path: ./.env
      - path: ./.env.blockchain
    volumes:
      - ../srcs/blockchain:/app/srcs/blockchain
      - ../srcs/shared/core:/app/srcs/shared/core
      - /app/node_modules
      - /app/srcs/blockchain/node_modules
      - /app/srcs/shared/core/node_modules
      - data:/data
      - ../make/scripts/certs/certs/services/${BK_SERVICE_NAME}:/etc/certs:ro
      - ../make/scripts/certs/certs/ca:/etc/ca:ro
    networks:
      - app-network
    command: >
      npx nodemon --watch src 
                  --watch ../shared/core/src 
                  -e ts 
                  --exec "npx tsx" src/server.ts
    restart: 'no'
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          '--no-check-certificate',
          'https://127.0.0.1:${BK_SERVICE_PORT}/health',
        ]

  game-service:
    build:
      context: ..
      dockerfile: srcs/game/Dockerfile
      target: builder
    container_name: '${GAME_SERVICE_NAME}'
    expose:
      - '${GAME_SERVICE_PORT}'
    working_dir: /app/srcs/game
    environment:
      - NODE_ENV=development
    env_file:
      - path: ./.env
      - path: ./.env.game
    volumes:
      - ../srcs/game:/app/srcs/game
      - ../srcs/shared/core:/app/srcs/shared/core
      - /app/node_modules
      - /app/srcs/game/node_modules
      - /app/srcs/shared/core/node_modules
      - ../make/scripts/certs/certs/services/${GAME_SERVICE_NAME}:/etc/certs:ro
      - ../make/scripts/certs/certs/ca:/etc/ca:ro
    networks:
      - app-network
    command: npx nodemon --watch src --watch ../shared/core/src -e ts --exec "npx tsx" src/Server.ts
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          '--no-check-certificate',
          'https://127.0.0.1:${GAME_SERVICE_PORT}/health',
        ]

  # ============================================================================
  # API Gateway Layer
  # ============================================================================

  api-gateway:
    build:
      context: ../
      dockerfile: 'srcs/gateway/Dockerfile'
      target: builder
    container_name: '${API_GATEWAY_NAME}'
    working_dir: /app/srcs/gateway
    expose:
      - '${API_GATEWAY_PORT}'
    env_file:
      - path: ./.env
      - path: ./.env.gateway
    environment:
      - NODE_ENV=development
    networks:
      - app-network
    volumes:
      - ../srcs/gateway:/app/srcs/gateway
      - ../srcs/shared/core:/app/srcs/shared/core
      - /app/node_modules
      - /app/srcs/gateway/node_modules
      - /app/srcs/shared/core/node_modules
      - ../make/scripts/certs/certs/services/${API_GATEWAY_NAME}:/etc/certs:ro
      - ../make/scripts/certs/certs/ca:/etc/ca:ro
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
    command: >
      sh -c "npx nodemon --watch src --watch ../shared/core/src -e ts --exec 'npx tsx' src/index.ts"
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          '--no-check-certificate',
          'https://127.0.0.1:${API_GATEWAY_PORT}/health',
        ]

  # ============================================================================
  # Reverse Proxy Layer
  # ============================================================================

  nginx-proxy:
    build:
      context: ..
      dockerfile: srcs/nginx/Dockerfile
      target: dev
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_SCHOOL42_CLIENT_ID: ${VITE_SCHOOL42_CLIENT_ID:-}
    container_name: '${PROXY_SERVICE_NAME}'
    ports:
      - '8080:80'
      - '4430:443'
    env_file:
      - path: ./.env.nginx
    environment:
      - NODE_ENV=development
    working_dir: /app/srcs/nginx
    volumes:
      - ../srcs/nginx:/app/srcs/nginx
      - ../srcs/shared/core:/app/srcs/shared/core
      - /app/node_modules
      - /app/srcs/nginx/node_modules
      - /app/srcs/shared/core/node_modules
      - ../make/scripts/certs/certs/nginx:/etc/nginx/certs:ro
      - ../make/scripts/certs/certs/ca:/etc/nginx/ca:ro
      - uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - app-network
    command: >
      sh -c "npm run dev &
      until wget -q --spider http://127.0.0.1:5173; do sleep 1; done &&
      nginx -g 'daemon off;'"
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
      blockchain-service:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          '--no-check-certificate',
          'https://localhost/health',
        ]

  pong-ai-service:
    profiles:
      - ai
    build:
      context: ..
      dockerfile: srcs/pong-ai/Dockerfile
      target: builder
    container_name: ${PONG_AI_SERVICE_NAME}
    expose:
      - '${PONG_AI_SERVICE_PORT}'
    env_file:
      - path: ./.env
    environment:
      - MODEL_PATH=/app/models/best_model
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./pong-ai/models:/app/models
      - ../make/scripts/certs/${PONG_AI_SERVICE_NAME}:/etc/certs:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-template
      test:
        [
          'CMD',
          'curl',
          '-f',
          '--no-check-certificate',
          'https://127.0.0.1:${PONG_AI_SERVICE_PORT}/health',
        ]
networks:
  app-network:
    driver: bridge

volumes:
  data:
    driver: local
    driver_opts:
      device: ${HOST_VOLUME_PATH}/database
      o: bind
      type: none
  uploads:
    driver: local
    driver_opts:
      device: ${HOST_VOLUME_PATH}/uploads
      o: bind
      type: none
